name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile
        run: python -m compileall -q sim dashboard tools plugins tests

      - name: Smoke — path resolution & imports
        run: python -c "from sim.volta_paths import project_root_path; r=project_root_path(); assert (r/'sim'/'faraday_pipeline.py').is_file(), r"
